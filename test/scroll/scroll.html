<!doctype html>
<html>
  <head>
    <title>Scroll Test</title>
    <style>
      /* The outer container with fixed dimensions */
      .scroll-container {
        position: relative;
        width: 400px;
        height: 400px;
        border: 2px solid #333;
        overflow-y: auto; /* Enables vertical scrolling */
        margin-top: 10px;
        /* Layout for the squares */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 200px; /* Adjust this for more/less space between squares */
        padding: 20px 0;
      }

      /* The red squares */
      .square {
        width: 100px;
        height: 100px;
        border-radius: 20px;
        flex-shrink: 0; /* Prevents squares from squishing */
      }

      .red {
        background-color: red;
      }

      .green {
        background-color: green;
        left: 80px;
      }

      .yellow {
        background-color: rgb(236, 236, 62);
      }

      .blue {
        background-color: blue;
      }

      /* marker style */
      .marker {
        /* fixed point to the right of the body not the container how to fix it */
        position: sticky;
        top: 50%;
        display: flex;
        margin-left: auto;
        margin-right: 10px;
        gap: 2px;
        min-width: 90px;
        max-width: 70px;
        flex-direction: column;
      }

      .marker .text {
        color: #4d7c0f;
        text-align: right;
        padding-left: 7px;
        padding-right: 7px;
        font-family: sans-serif;
        font-size: x-small;
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: capitalize;
      }

      .marker .border {
        height: 2px;
        width: 100%;
        border-radius: 10px;
        background-color: #365314;
      }
    </style>
    <script src="./scroll.js" type="module" defer></script>
  </head>
  <body>
    <div class="scroll-container">
      <div class="square green"></div>
      <div class="square yellow"></div>
      <div class="square red"></div>
      <div class="square blue"></div>
      <!-- <div class="square"></div> -->
    </div>
  </body>
</html>
